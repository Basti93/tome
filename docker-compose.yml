services:
  # Vite dev server (optional - for hot reload during development)
  vite:
    build:
      context: ./app
      dockerfile: Dockerfile.vite
    container_name: tome-vite
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    networks:
      - tome-network
    environment:
      # Use relative URL - works in Docker and local dev
      # Vite dev server proxies /api/* requests
      - VITE_API_URL=/api/v1
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: tome-nginx
    ports:
      - "8000:80"
    volumes:
      - ./server/public:/var/www/html/public
      - ./server/public_app:/var/www/html/public_app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - tome-network
    restart: unless-stopped

  # Laravel backend
  laravel:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tome-laravel
    volumes:
      - ./server:/var/www/html
    environment:
      - APP_NAME=TOME
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_HOST=mysql
      - DB_DATABASE=tome
      - DB_USERNAME=tome
      - DB_PASSWORD=tome
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_FROM_ADDRESS=noreply@tome.local
      - MAIL_FROM_NAME="TOME"
    depends_on:
      - mysql
    networks:
      - tome-network

  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: tome-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tome
      MYSQL_USER: tome
      MYSQL_PASSWORD: tome
      MYSQL_INITDB_SKIP_TZINFO: 1
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tome-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

  # Mailpit for testing emails
  mailpit:
    image: axllent/mailpit:latest
    container_name: tome-mailpit
    ports:
      - "1025:1025"   # SMTP port
      - "8025:8025"   # Web UI port
    networks:
      - tome-network
    restart: unless-stopped

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tome-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: tome
      PMA_PASSWORD: tome
      PMA_ROOT_PASSWORD: root
    ports:
      - "8001:80"
    depends_on:
      - mysql
    networks:
      - tome-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  tome-network:
    driver: bridge
