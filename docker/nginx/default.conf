server {
    listen 80;
    server_name localhost;

    charset utf-8;

    # Deny hidden files
    location ~ /\. {
        deny all;
    }

    # API routes - Laravel backend
    location /api/ {
        root /var/www/html/public;
        try_files $uri $uri/ @laravel;
    }

    # Laravel API handler
    location @laravel {
        root /var/www/html/public;
        rewrite ^(.*)$ /index.php?$query_string last;
    }

    # PHP files (Laravel API)
    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass laravel:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Profile images
    location /profile_images/ {
        root /var/www/html/public_app;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Vue app assets
    location ~* ^/assets/ {
        root /var/www/html/public_app;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Vue app manifest and other files
    location ~* \.(js|css|json|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        root /var/www/html/public_app;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Vue app fallback - everything else goes to index.html
    location / {
        root /var/www/html/public_app;
        try_files $uri /index.html;
    }

    # Cache control for Vue index.html
    location = /index.html {
        root /var/www/html/public_app;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
